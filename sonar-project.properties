# ===================================================================
# SonarQube — ms-notificaciones-util
# Compatible con SonarQube 9.x / SonarCloud
# ===================================================================

sonar.projectKey=co.com:ms-notificaciones-util
sonar.projectName=ms-notificaciones-util
sonar.projectVersion=1.0.0

# Codificación del proyecto
sonar.sourceEncoding=UTF-8

# Fuentes y tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=17
sonar.java.target=17

# Binarios compilados
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Cobertura JaCoCo
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Checkstyle
sonar.java.checkstyle.reportPaths=build/reports/checkstyle/main.xml

# PMD
sonar.java.pmd.reportPaths=build/reports/pmd/main.xml

# SpotBugs
sonar.java.spotbugs.reportPaths=build/reports/spotbugs/main.xml

# Exclusiones del análisis (no modificar sin aprobación del arquitecto)
sonar.exclusions=\
  **/MsNotificacionesUtilApplication.java,\
  **/domain/entities/**,\
  **/domain/event/**,\
  **/dto/**,\
  **/enums/**,\
  **/repositories/**,\
  **/config/**,\
  **/templates/entities/**,\
  **/templates/repositories/**

# Exclusiones de cobertura (coincide con jacocoExcludes)
sonar.coverage.exclusions=\
  **/MsNotificacionesUtilApplication.java,\
  **/domain/entities/**,\
  **/domain/event/**,\
  **/dto/**,\
  **/enums/**,\
  **/repositories/**,\
  **/config/**,\
  **/templates/entities/**,\
  **/templates/repositories/**

# Quality Gate
sonar.qualitygate.wait=true

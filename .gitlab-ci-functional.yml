stages:
  - smoke
  - regression

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  KARATE_ENV: ${AMBIENTE_PIPE:-dev}

.karate-base:
  image: eclipse-temurin:21-jdk
  before_script:
    - chmod +x gradlew
    - ./gradlew compileAutomatedTestJava --no-daemon
  artifacts:
    when: always
    paths:
      - build/karate-reports/
    expire_in: 30 days
    reports:
      junit: build/karate-reports/xml/**/*.xml

karate-smoke:
  extends: .karate-base
  stage: smoke
  script:
    - >
      ./gradlew acceptanceTest
      -Dkarate.env=${KARATE_ENV}
      -Dkarate.options="--tags @smoke"
      --no-daemon
  variables:
    JWT_SECRET: ${JWT_SECRET}
    QA_BASE_URL: ${QA_BASE_URL}
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

karate-regression:
  extends: .karate-base
  stage: regression
  needs: [karate-smoke]
  script:
    - >
      ./gradlew acceptanceTest
      -Dkarate.env=${KARATE_ENV}
      -Dkarate.options="--tags @regression"
      --no-daemon
  variables:
    JWT_SECRET: ${JWT_SECRET}
    QA_BASE_URL: ${QA_BASE_URL}
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
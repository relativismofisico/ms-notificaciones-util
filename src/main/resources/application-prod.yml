security:
  jwt:
    # En producción el secreto DEBE venir de variable de entorno o secret manager.
    # Nunca hardcodear en este archivo.
    secret: ${JWT_SECRET}
  rol:
    administracion:
      - ADMINISTRADOR
      - EMPRESA
      - OPERARIO
      - FONDEADOR

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
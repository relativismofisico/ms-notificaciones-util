# ── Servidor ───────────────────────────────────────────────────────────────────
protocol=http
host=qa-server
port=8055
base_path=/securityapi

# ── JWT ────────────────────────────────────────────────────────────────────────
# Sobreescribir obligatoriamente via: -Djwt.secret=$JWT_SECRET
jwt.secret=AF84F1FGllNpNnLG055fdg5hGHJK4KGG5VH5TR5J05JFGGDFDGXVV545J4505G666JFGF2mMY95y
jwt.expiry.seconds=3600

# ── Usuarios de prueba ─────────────────────────────────────────────────────────
test.user.admin.username=qa-admin
test.user.admin.rol=ADMINISTRADOR
test.user.empresa.username=qa-empresa
test.user.empresa.rol=EMPRESA

# ── Data ───────────────────────────────────────────────────────────────────────
data.dir=../data/qa

# ── Timeouts (ms) ──────────────────────────────────────────────────────────────
connect.timeout=10000
response.timeout=30000

# ── Umbrales de tiempo de respuesta (ms) ───────────────────────────────────────
threshold.smoke.ms=5000
threshold.load.p95.ms=3000
threshold.concurrent.p99.ms=10000

# ── Perfiles de carga ──────────────────────────────────────────────────────────
smoke.threads=1
smoke.rampup=1
smoke.loops=1

load.threads=10
load.rampup=10
load.duration=60

concurrent.threads=100
concurrent.rampup=30
concurrent.duration=120

# ── Produccion guard ───────────────────────────────────────────────────────────
prod.mode=false
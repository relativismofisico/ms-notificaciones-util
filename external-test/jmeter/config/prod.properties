# ── Servidor ───────────────────────────────────────────────────────────────────
# OBLIGATORIO: sobreescribir host y port via variables de entorno
# -Dhost=$PROD_HOST -Dport=$PROD_PORT
protocol=https
host=CONFIGURAR_VIA_ENV_PROD_HOST
port=443
base_path=/securityapi

# ── JWT ────────────────────────────────────────────────────────────────────────
# OBLIGATORIO en produccion: -Djwt.secret=$JWT_SECRET
jwt.secret=CONFIGURAR_VIA_ENV_JWT_SECRET
jwt.expiry.seconds=300

# ── Usuarios de prueba ─────────────────────────────────────────────────────────
test.user.admin.username=qa-perf-prod
test.user.admin.rol=ADMINISTRADOR

# ── Data ───────────────────────────────────────────────────────────────────────
data.dir=../data/prod

# ── Timeouts (ms) ──────────────────────────────────────────────────────────────
connect.timeout=15000
response.timeout=60000

# ── Umbrales de tiempo de respuesta (ms) ───────────────────────────────────────
threshold.smoke.ms=5000
threshold.load.p95.ms=5000
threshold.concurrent.p99.ms=15000

# ── Perfiles de carga (reducidos en prod) ─────────────────────────────────────
smoke.threads=1
smoke.rampup=1
smoke.loops=1

load.threads=10
load.rampup=30
load.duration=60

concurrent.threads=100
concurrent.rampup=60
concurrent.duration=120

# ── PROTECCION DE PRODUCCION ───────────────────────────────────────────────────
# Solo GET/HEAD permitidos - POST/PUT/PATCH/DELETE bloqueados en scripts
prod.mode=true
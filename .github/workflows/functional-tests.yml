name: Functional Tests - Karate

on:
  push:
    branches: [develop, main, release/**]
  pull_request:
    branches: [develop, main]
  workflow_dispatch:
    inputs:
      ambiente:
        description: 'Ambiente de ejecución'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      tags:
        description: 'Tags de Karate (ej: @smoke, @regression)'
        required: false
        default: '@smoke'

jobs:
  smoke-tests:
    name: Smoke Tests (${{ github.event.inputs.ambiente || 'dev' }})
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.tags == '@smoke'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Smoke Tests
        env:
          AMBIENTE_PIPE: ${{ github.event.inputs.ambiente || 'dev' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
        run: |
          ./gradlew acceptanceTest \
            -Dkarate.env=${AMBIENTE_PIPE} \
            -Dkarate.options="--tags @smoke" \
            --no-daemon

      - name: Upload Karate Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-smoke-reports-${{ github.run_number }}
          path: |
            build/karate-reports/
            build/karate-cucumber-html-reports/
          retention-days: 30

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Run Regression Tests
        env:
          AMBIENTE_PIPE: ${{ github.event.inputs.ambiente || 'qa' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          QA_BASE_URL: ${{ secrets.QA_BASE_URL }}
        run: |
          ./gradlew acceptanceTest \
            -Dkarate.env=${AMBIENTE_PIPE} \
            -Dkarate.options="--tags @regression" \
            --no-daemon

      - name: Upload Regression Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-regression-reports-${{ github.run_number }}
          path: build/karate-reports/
          retention-days: 30

      - name: Publish JUnit Results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: 'build/karate-reports/xml/**/*.xml'
          check_name: 'Karate Functional Tests'